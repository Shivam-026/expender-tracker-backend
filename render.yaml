services:
  - type: web
    name: expense-tracker-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: sqlite:///./expenses.db
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src
      sizeGB: 1
