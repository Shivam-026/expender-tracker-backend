services:
  - type: web
    name: expender-tracker-backend
    runtime: python
    plan: free
    buildCommand: |
      apt-get update && apt-get install -y python3.11 python3.11-venv python3-pip
      python3.11 -m pip install -r requirements.txt
    startCommand: python3.11 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./expenses.db
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src
      sizeGB: 1
