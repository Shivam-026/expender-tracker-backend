services:
  - type: web
    name: expender-tracker-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./expenses.db
      - key: FRONTEND_URL
        value: https://expender-tracker-frontend.vercel.app
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src
      sizeGB: 1
